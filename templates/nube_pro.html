<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Jochis Cloud Express</title>
    <style>
        body { background: #020617; color: #60a5fa; font-family: sans-serif; padding: 40px; text-align: center; }
        .box { background: #1e293b; border: 2px solid #3b82f6; padding: 30px; border-radius: 15px; max-width: 500px; margin: auto; }
        .btn { background: #2563eb; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 15px; transition: 0.2s; }
        .btn:hover { background: #1d4ed8; }
        .btn-view { background: #059669; width: auto; padding: 6px 12px; font-size: 12px; margin-top: 0; }
        .btn-view:hover { background: #047857; }
        
        #progress { display: none; background: #334155; height: 20px; border-radius: 10px; margin-top: 20px; overflow: hidden; }
        #bar { width: 0%; height: 100%; background: #22c55e; transition: 0.1s; }
        
        .file-item { display: flex; justify-content: space-between; align-items: center; background: #0f172a; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #334155; }
        .actions { display: flex; gap: 10px; }

        /* Estilos del Pre-visualizador (Modal) */
        #preview-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px);
            justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: #1e293b; padding: 20px; border-radius: 15px; border: 2px solid #3b82f6;
            max-width: 80%; max-height: 80%; text-align: center; position: relative;
        }
        .close-btn {
            position: absolute; top: -15px; right: -15px; background: #ef4444; color: white;
            border: none; border-radius: 50%; width: 35px; height: 35px; font-weight: bold; cursor: pointer;
        }
        .close-btn:hover { background: #dc2626; }
        #media-container img, #media-container video { max-width: 100%; max-height: 60vh; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🚀 Subida Express (Bypass)</h2>
        <form id="upload-form">
            <input type="file" id="file-input" required style="color: white;">
            <button type="submit" class="btn">Subir Archivo</button>
        </form>
        <div id="progress"><div id="bar"></div></div>
        <p id="msg"></p>
    </div>

    <div style="max-width: 600px; margin: 30px auto;">
        <h3>📦 Mis Archivos</h3>
        {% for a in archivos %}
        <div class="file-item">
            <span style="font-size: 14px; color: white; max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                📄 {{ a.public_id }}
            </span>
            <div class="actions">
                <button class="btn btn-view" onclick="abrirPreview('{{ a.secure_url }}', '{{ a.resource_type }}', '{{ a.format }}')">👁️ Ver</button>
                <a href="{{ a.secure_url }}" target="_blank" style="color: #38bdf8; font-size: 14px; text-decoration: none; padding-top: 5px;">⬇️</a>
            </div>
        </div>
        {% endfor %}
    </div>

    <div id="preview-modal">
        <div class="modal-content">
            <button class="close-btn" onclick="cerrarPreview()">X</button>
            <div id="media-container">
                </div>
        </div>
    </div>

    <script>
        // --- LÓGICA DE SUBIDA ---
        const form = document.getElementById('upload-form');
        const bar = document.getElementById('bar');

        form.onsubmit = function(e) {
            e.preventDefault();
            const formData = new FormData();
            formData.append('archivo', document.getElementById('file-input').files[0]);

            const xhr = new XMLHttpRequest();
            document.getElementById('progress').style.display = 'block';

            xhr.upload.onprogress = (e) => {
                if (e.lengthComputable) {
                    bar.style.width = Math.round((e.loaded / e.total) * 100) + '%';
                }
            };

            xhr.onload = () => {
                if (xhr.status === 200) { location.reload(); }
                else { alert("Error al subir. Revisa la consola."); }
            };

            xhr.open('POST', '/subir', true);
            xhr.send(formData);
        };

        // --- LÓGICA DEL PRE-VISUALIZADOR ---
        const modal = document.getElementById('preview-modal');
        const mediaContainer = document.getElementById('media-container');

        function abrirPreview(url, tipo, formato) {
            mediaContainer.innerHTML = ''; // Limpiamos lo anterior
            
            if (tipo === 'image') {
                mediaContainer.innerHTML = `<img src="${url}" alt="Preview">`;
            } else if (tipo === 'video') {
                mediaContainer.innerHTML = `<video controls autoplay><source src="${url}" type="video/${formato}">Tu navegador no soporta el video.</video>`;
            } else {
                // Para archivos RAW (.exe, .rar, etc)
                mediaContainer.innerHTML = `
                    <h3 style="color: white;">📦 Archivo de Sistema/Comprimido</h3>
                    <p style="color: #94a3b8;">No se puede previsualizar este tipo de archivo.</p>
                    <a href="${url}" class="btn" style="display: inline-block; width: auto; text-decoration: none;">Descargar Archivo</a>
                `;
            }
            modal.style.display = 'flex';
        }

        function cerrarPreview() {
            modal.style.display = 'none';
            mediaContainer.innerHTML = ''; // Limpiamos para que los videos dejen de sonar
        }

        // Cerrar si haces clic afuera de la caja
        window.onclick = function(event) {
            if (event.target == modal) { cerrarPreview(); }
        }
    </script>
</body>
</html>
