<!DOCTYPE html>
<html>
<head>
    <title>Jochis Cloud</title>
    <style>
        body { background: #0f172a; color: #38bdf8; font-family: sans-serif; text-align: center; padding: 50px; }
        .box { border: 2px solid #38bdf8; padding: 30px; border-radius: 15px; display: inline-block; background: #1e293b; }
        h1 { color: #f0f9ff; }
        input[type="file"] { margin: 20px; color: #94a3b8; }
        input[type="submit"] { background: #0ea5e9; color: white; border: none; padding: 10px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        input[type="submit"]:hover { background: #0284c7; }
    </style>
</head>
<body>
    <h1>☁️ Mi Nube Personal</h1>
    <div class="box">
        <form action="/subir" method="post" enctype="multipart/form-data">
            <input type="file" name="archivo">
            <br>
            <input type="submit" value="Subir Archivo a la Nube">
        </form>
    </div>
</body>
</html>
